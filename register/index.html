<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLits — Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #fff;
            min-height: 100vh;
        }

        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background: rgba(11, 13, 21, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 520px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 36px;
            margin-bottom: 16px;
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #c084fc, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
            transform: translateY(-2px);
        }

        .avatar-section {
            text-align: center;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background-size: cover;
            background-position: center;
            border: 3px solid #7c3aed;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: rgba(0, 0, 0, 0.3);
        }

        .avatar-preview:hover {
            transform: scale(1.05);
            border-color: #06b6d4;
        }

        .avatar-label {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(124, 58, 237, 0.3);
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .avatar-label:hover {
            background: rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
        }

        .captcha-group {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .captcha-word {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 12px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            font-family: 'Space Grotesk', monospace;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #9ca3af;
        }

        .login-link a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #06b6d4;
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #fca5a5;
            font-size: 14px;
            text-align: center;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #6ee7b7;
            font-size: 14px;
            text-align: center;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .register-card::-webkit-scrollbar {
            width: 6px;
        }

        .register-card::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .register-card::-webkit-scrollbar-thumb {
            background: #7c3aed;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    
    <div class="container">
        <div class="register-card">
            <h1 class="title">🚀 Создать аккаунт</h1>
            <div class="subtitle">Присоединяйтесь к VOLits сообществу</div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
            
            <div class="input-group">
                <label>👤 Логин</label>
                <input type="text" id="username" placeholder="Придумайте логин" autocomplete="username">
            </div>
            
            <div class="input-group">
                <label>🔒 Пароль</label>
                <input type="password" id="password" placeholder="Придумайте пароль" autocomplete="new-password">
            </div>
            
            <div class="avatar-section">
                <label>🖼️ Аватар (необязательно)</label>
                <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=default')"></div>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                <div class="avatar-label" onclick="document.getElementById('avatarInput').click()">
                    📸 Выбрать фото
                </div>
            </div>
            
            <div class="captcha-group">
                <div class="captcha-word" id="captchaWord">МОСКВА</div>
                <input type="text" id="captchaInput" placeholder="Введите слово выше" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(124,58,237,0.3); border-radius: 8px; color: white; text-align: center;">
            </div>
            
            <button class="btn-primary" id="registerBtn" onclick="register()">Зарегистрироваться</button>
            
            <div class="login-link">
                Уже есть аккаунт? <a href="/login/">Войти</a>
            </div>
        </div>
    </div>

    <script>
        // ЖЁСТКИЙ URL ДЛЯ API
        const API_URL = 'https://volvs.onrender.com';
        
        const captchaWords = ["МОСКВА", "ВОЛГА", "ДРУЖБА", "КОСМОС", "РОССИЯ", "СВОБОДА", "РАКЕТА", "VOLITS"];
        let selectedAvatar = null;
        
        function generateCaptcha() {
            const word = captchaWords[Math.floor(Math.random() * captchaWords.length)];
            document.getElementById('captchaWord').textContent = word;
            return word;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedAvatar = event.target.result;
                    document.getElementById('avatarPreview').style.backgroundImage = `url('${selectedAvatar}')`;
                    document.getElementById('avatarPreview').style.backgroundSize = 'cover';
                };
                reader.readAsDataURL(file);
            }
        });
        
        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captchaInput').value.trim().toUpperCase();
            const captchaWord = document.getElementById('captchaWord').textContent;
            const registerBtn = document.getElementById('registerBtn');
            
            if (!username || !password) {
                showError('❌ Заполните все поля');
                return;
            }
            
            if (username.length < 3) {
                showError('❌ Логин должен содержать минимум 3 символа');
                return;
            }
            
            if (password.length < 4) {
                showError('❌ Пароль должен содержать минимум 4 символа');
                return;
            }
            
            if (captchaInput !== captchaWord) {
                showError('❌ Неверная капча');
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<div class="loader"></div> Регистрация...';
            
            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        login: username,
                        password: password,
                        avatar: selectedAvatar || ''
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'ok') {
                    showSuccess('✅ Регистрация успешна! Перенаправление на вход...');
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 1500);
                } else {
                    showError('❌ ' + data.message);
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = 'Зарегистрироваться';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('❌ Ошибка соединения с сервером: ' + error.message);
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Зарегистрироваться';
            }
        }
        
        // Canvas фон с частицами
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        const particles = [];
        
        function initParticles() {
            resizeCanvas();
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    color: `rgba(124, 58, 237, ${Math.random() * 0.5})`
                });
            }
        }
        
        function animateParticles() {
            if (!ctx) return;
            
            ctx.fillStyle = 'rgba(11, 13, 21, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            
            requestAnimationFrame(animateParticles);
        }
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            particles.forEach(p => {
                p.x = Math.random() * canvas.width;
                p.y = Math.random() * canvas.height;
            });
        });
        
        initParticles();
        animateParticles();
        generateCaptcha();
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                register();
            }
        });
    </script>
</body>
</html>
