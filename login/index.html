<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLits — Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        .captcha {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .captcha-word {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 10px;
            color: #fff;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
        }
        .link a {
            color: white;
            text-decoration: none;
        }
        .error {
            background: rgba(255,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ Вход в VOLits</h1>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <input type="text" id="login" placeholder="👤 Логин">
        <input type="password" id="password" placeholder="🔒 Пароль">
        
        <div class="captcha">
            <div class="captcha-word" id="captchaWord">МОСКВА</div>
            <input type="text" id="captchaInput" placeholder="Введите слово" style="margin-bottom: 0;">
        </div>
        
        <button onclick="login()">Войти</button>
        
        <div class="link">
            Нет аккаунта? <a href="/register/">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://volvs.onrender.com';
        const captchaWords = ["МОСКВА", "ВОЛГА", "ДРУЖБА", "КОСМОС", "РОССИЯ", "СВОБОДА", "РАКЕТА", "VOLITS"];
        
        function generateCaptcha() {
            const word = captchaWords[Math.floor(Math.random() * captchaWords.length)];
            document.getElementById('captchaWord').textContent = word;
        }
        
        async function login() {
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captchaInput').value.trim().toUpperCase();
            const captchaWord = document.getElementById('captchaWord').textContent;
            const errorDiv = document.getElementById('error');
            
            if (!login || !password) {
                errorDiv.textContent = '❌ Заполните все поля';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (captchaInput !== captchaWord) {
                errorDiv.textContent = '❌ Неверная капча';
                errorDiv.style.display = 'block';
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }
            
            errorDiv.style.display = 'none';
            
            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: login, password: password })
                });
                
                const data = await res.json();
                
                if (data.status === 'ok') {
                    // Сохраняем сессию
                    const users = JSON.parse(localStorage.getItem('volits_users') || '[]');
                    const existing = users.find(u => u.login === data.user.login);
                    if (!existing) {
                        users.push(data.user);
                    } else {
                        Object.assign(existing, data.user);
                    }
                    localStorage.setItem('volits_users', JSON.stringify(users));
                    localStorage.setItem('volits_session', JSON.stringify({
                        user: data.user.login,
                        expires: Date.now() + 7 * 24 * 60 * 60 * 1000
                    }));
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = '❌ ' + data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = '❌ Ошибка сервера';
                errorDiv.style.display = 'block';
            }
        }
        
        generateCaptcha();
    </script>
</body>
</html>
