<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLits Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .messenger {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            min-height: 80vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-size: cover;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            min-height: 400px;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
        }
        .message.own {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 60%;
            padding: 10px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
        }
        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .message-input {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
        }
        .message-input input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            color: white;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }
        .friends-list {
            list-style: none;
        }
        .friend-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .friend-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .logout-btn {
            margin-top: 20px;
            background: rgba(255,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="messenger">
            <div class="sidebar">
                <div class="user-info" id="userInfo">
                    <div class="avatar" id="userAvatar"></div>
                    <div>
                        <div id="userName"></div>
                        <small>● В сети</small>
                    </div>
                </div>
                <h3>💬 Друзья</h3>
                <div class="friends-list" id="friendsList"></div>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <h3 id="chatWith">Выберите друга</h3>
                </div>
                <div class="messages" id="messages"></div>
                <div class="message-input">
                    <input type="text" id="messageInput" placeholder="Введите сообщение...">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://volvs.onrender.com';
        let currentUser = null;
        let currentChat = null;
        
        // Проверка сессии
        const session = localStorage.getItem('volits_session');
        if (!session) {
            window.location.href = '/login/';
        }
        
        const sessionData = JSON.parse(session);
        if (sessionData.expires < Date.now()) {
            localStorage.removeItem('volits_session');
            window.location.href = '/login/';
        }
        
        init();
        
        async function init() {
            const users = JSON.parse(localStorage.getItem('volits_users') || '[]');
            currentUser = users.find(u => u.login === sessionData.user);
            
            if (!currentUser) {
                window.location.href = '/login/';
                return;
            }
            
            document.getElementById('userName').textContent = currentUser.login;
            document.getElementById('userAvatar').style.backgroundImage = `url('${currentUser.avatar}')`;
            
            loadFriends();
            startPolling();
        }
        
        function loadFriends() {
            const friendsList = document.getElementById('friendsList');
            const friends = currentUser.friends || [];
            
            if (friends.length === 0) {
                friendsList.innerHTML = '<p style="color: rgba(255,255,255,0.5);">🤝 Добавьте друзей через поиск</p>';
                return;
            }
            
            friendsList.innerHTML = friends.map(friend => `
                <div class="friend-item" onclick="selectChat('${friend}')">
                    👤 ${friend}
                </div>
            `).join('');
        }
        
        function selectChat(friend) {
            currentChat = friend;
            document.getElementById('chatWith').textContent = friend;
            loadMessages();
        }
        
        async function loadMessages() {
            if (!currentChat) return;
            
            try {
                const res = await fetch(`${API_URL}/api/get_messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: currentUser.login, with: currentChat })
                });
                
                const data = await res.json();
                renderMessages(data.messages || []);
            } catch (err) {
                console.error(err);
            }
        }
        
        function renderMessages(messages) {
            const container = document.getElementById('messages');
            
            if (messages.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5);">💬 Напишите первое сообщение!</p>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.from === currentUser.login ? 'own' : ''}">
                    <div class="message-bubble">
                        ${msg.text}
                        <div style="font-size: 10px; opacity: 0.7;">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentChat) return;
            
            try {
                await fetch(`${API_URL}/api/send_message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from: currentUser.login,
                        to: currentChat,
                        message: text
                    })
                });
                
                input.value = '';
                await loadMessages();
            } catch (err) {
                console.error(err);
            }
        }
        
        function startPolling() {
            setInterval(async () => {
                if (!currentUser) return;
                
                try {
                    const res = await fetch(`${API_URL}/api/poll`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user: currentUser.login })
                    });
                    
                    const data = await res.json();
                    
                    for (const event of data.events) {
                        if (event.type === 'new_message' && currentChat === event.from) {
                            await loadMessages();
                        } else if (event.type === 'friend_request') {
                            const accept = confirm(`📨 ${event.from} хочет добавить вас в друзья! Принять?`);
                            if (accept) {
                                await fetch(`${API_URL}/api/accept_friend`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ user: currentUser.login, friend: event.from })
                                });
                                alert(`✅ Вы и ${event.from} теперь друзья!`);
                                location.reload();
                            }
                        }
                    }
                } catch (err) {
                    console.error(err);
                }
            }, 3000);
        }
        
        function logout() {
            localStorage.removeItem('volits_session');
            window.location.href = '/login/';
        }
    </script>
</body>
</html>
