<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VOLits Messenger - Современное общение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Анимированный живой фон */
        .animated-gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(270deg, #1e1f22, #2d1b3d, #1a2a4a, #1e1f22);
            background-size: 400% 400%;
            animation: movingGradient 15s ease infinite;
        }

        @keyframes movingGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Плавающие частицы для живости */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(124, 58, 237, 0.3);
            border-radius: 50%;
            animation: floatParticle 20s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
            50% { transform: translate(100px, -100px) scale(1.5); opacity: 0.5; }
        }

        /* Главный контейнер с блюром */
        .main-container {
            width: 70%;
            height: 85vh;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: rgba(30, 31, 34, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: containerAppear 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes containerAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Контейнер аутентификации */
        .auth-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 500px;
            z-index: 10;
            animation: fadeInScale 0.5s ease;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .auth-card {
            background: rgba(30, 31, 34, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(124, 58, 237, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(124, 58, 237, 0.3);
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 60px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .auth-form {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-form.hidden {
            display: none;
        }

        .form-title {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
            transform: translateY(-2px);
        }

        .captcha-group {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .captcha-word {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }

        /* Сетка аватаров при регистрации */
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 12px;
        }

        .avatar-option {
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            background-size: cover;
            background-position: center;
        }

        .avatar-option.selected {
            border-color: #10b981;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        .avatar-option:hover {
            transform: scale(1.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.5);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Мессенджер */
        .messenger-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        .messenger-container.active {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Левая панель */
        .chats-panel {
            width: 320px;
            background: rgba(30, 31, 34, 0.95);
            border-right: 1px solid rgba(124, 58, 237, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-area {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 8px 12px;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .search-input-wrapper:focus-within {
            background: rgba(0, 0, 0, 0.5);
            transform: translateY(-1px);
        }

        .search-input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .global-search-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .global-search-btn:hover {
            transform: scale(1.05) rotate(90deg);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 4px;
        }

        .chat-item:hover {
            background: rgba(124, 58, 237, 0.2);
            transform: translateX(4px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(37, 99, 235, 0.3));
            border-left: 3px solid #7c3aed;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.3s ease;
        }

        .chat-item:hover .avatar {
            transform: scale(1.05);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: modalOverlayFade 0.3s ease;
        }

        @keyframes modalOverlayFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 31, 34, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalSlideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .main-container {
                width: 95%;
                height: 90vh;
            }
            
            .chats-panel {
                position: absolute;
                left: -100%;
                transition: left 0.3s ease;
                z-index: 20;
                height: 100%;
            }
            
            .chats-panel.open {
                left: 0;
            }
        }

        /* Стили для сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: messageSlideIn 0.3s ease;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-wrapper.own {
            flex-direction: row-reverse;
        }

        .message {
            max-width: 60%;
            padding: 10px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .message.own {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
        }

        .message.other {
            background: rgba(30, 31, 34, 0.8);
            backdrop-filter: blur(5px);
        }

        /* Профиль */
        .profile-panel {
            width: 320px;
            background: rgba(30, 31, 34, 0.95);
            border-left: 1px solid rgba(124, 58, 237, 0.2);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            overflow-y: auto;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-avatar:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            color: #ef4444;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="animated-gradient-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="main-container">
        <!-- Экран аутентификации -->
        <div id="authContainer" class="auth-container">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">ВХОД</button>
                    <button class="tab-btn" onclick="switchTab('register')">РЕГИСТРАЦИЯ</button>
                </div>

                <div id="loginForm" class="auth-form">
                    <div class="form-title">🔐 Добро пожаловать</div>
                    <div class="input-group">
                        <label>👤 Логин</label>
                        <input type="text" id="loginUsername" placeholder="Введите логин">
                    </div>
                    <div class="input-group">
                        <label>🔒 Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Введите пароль">
                    </div>
                    <div class="input-group captcha-group">
                        <div class="captcha-word" id="loginCaptchaWord">МОСКВА</div>
                        <input type="text" id="loginCaptcha" placeholder="Введите слово выше" style="margin-top: 10px;">
                    </div>
                    <button class="submit-btn" onclick="handleLogin()">
                        <span>Войти</span>
                    </button>
                </div>

                <div id="registerForm" class="auth-form hidden">
                    <div class="form-title">🌎 Создание аккаунта</div>
                    <div class="input-group">
                        <label>👤 Логин</label>
                        <input type="text" id="regUsername" placeholder="Введите логин">
                    </div>
                    <div class="input-group">
                        <label>🔒 Пароль</label>
                        <input type="password" id="regPassword" placeholder="Введите пароль">
                    </div>
                    <div class="input-group">
                        <label>🎨 Выберите аватар</label>
                        <div class="avatar-grid" id="avatarGrid"></div>
                    </div>
                    <div class="input-group captcha-group">
                        <div class="captcha-word" id="regCaptchaWord">РОССИЯ</div>
                        <input type="text" id="regCaptcha" placeholder="Введите слово выше" style="margin-top: 10px;">
                    </div>
                    <button class="submit-btn" onclick="handleRegister()">
                        <span>Зарегистрироваться</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Интерфейс мессенджера (будет заполнен динамически) -->
        <div id="messengerContainer" class="messenger-container">
            <!-- Контент будет сгенерирован JavaScript -->
        </div>
    </div>

    <script>
        // Конфигурация
        let currentUser = null;
        let currentChat = null;
        let selectedAvatar = null;
        
        // Русские слова для капчи
        const captchaWords = ["МОСКВА", "РОССИЯ", "ВОЛГА", "ДРУЖБА", "СВОБОДА", "КОСМОС", "РАКЕТА", "VOLITS"];
        
        // Предустановленные аватары
        const avatarPresets = [
            "🎨", "🤖", "🐱", "🐶", "🦊", "🐼", "👨‍🚀", "🎭"
        ];
        
        // Инициализация пользователей в localStorage
        function initUsers() {
            if (!localStorage.getItem('volits_users')) {
                const defaultUsers = [
                    { login: "Алексей", password: btoa("123456"), avatar: "https://api.dicebear.com/7.x/initials/svg?seed=Алексей", status: "В сети", chats: [] },
                    { login: "Мария", password: btoa("123456"), avatar: "https://api.dicebear.com/7.x/initials/svg?seed=Мария", status: "В сети", chats: [] }
                ];
                localStorage.setItem('volits_users', JSON.stringify(defaultUsers));
            }
        }
        
        // Генерация капчи
        function generateCaptcha(formType) {
            const word = captchaWords[Math.floor(Math.random() * captchaWords.length)];
            if (formType === 'login') {
                document.getElementById('loginCaptchaWord').textContent = word;
            } else {
                document.getElementById('regCaptchaWord').textContent = word;
            }
            return word;
        }
        
        // Рендер аватаров при регистрации
        function renderAvatarOptions() {
            const grid = document.getElementById('avatarGrid');
            if (!grid) return;
            
            grid.innerHTML = avatarPresets.map((preset, index) => `
                <div class="avatar-option ${selectedAvatar === preset ? 'selected' : ''}" 
                     style="background: linear-gradient(135deg, #7c3aed, #2563eb); display: flex; align-items: center; justify-content: center; font-size: 32px;"
                     onclick="selectAvatarOption('${preset}')">
                    ${preset}
                </div>
            `).join('');
        }
        
        function selectAvatarOption(avatar) {
            selectedAvatar = avatar;
            renderAvatarOptions();
        }
        
        // Регистрация пользователя
        function registerUser(login, password, avatar) {
            let users = JSON.parse(localStorage.getItem('volits_users')) || [];
            
            if (users.find(u => u.login === login)) {
                alert('❌ Пользователь с таким логином уже существует!');
                return false;
            }
            
            users.push({
                login: login,
                password: btoa(password),
                avatar: avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${login}`,
                status: "В сети",
                chats: []
            });
            
            localStorage.setItem('volits_users', JSON.stringify(users));
            return true;
        }
        
        // Проверка входа
        function loginUser(login, password) {
            let users = JSON.parse(localStorage.getItem('volits_users')) || [];
            const user = users.find(u => u.login === login && u.password === btoa(password));
            
            if (user) {
                localStorage.setItem('session_active', 'true');
                localStorage.setItem('current_user', login);
                return true;
            }
            return false;
        }
        
        // Глобальный поиск пользователей
        function searchGlobalUsers(query, currentUserLogin) {
            let users = JSON.parse(localStorage.getItem('volits_users')) || [];
            return users.filter(u => 
                u.login.toLowerCase().includes(query.toLowerCase()) && 
                u.login !== currentUserLogin
            );
        }
        
        // Создание чата
        function createChat(user1, user2) {
            let users = JSON.parse(localStorage.getItem('volits_users')) || [];
            const user1Data = users.find(u => u.login === user1);
            const user2Data = users.find(u => u.login === user2);
            
            if (!user1Data.chats) user1Data.chats = [];
            if (!user2Data.chats) user2Data.chats = [];
            
            const chatId = `${user1}-${user2}`;
            
            if (!user1Data.chats.find(c => c.id === chatId)) {
                user1Data.chats.push({
                    id: chatId,
                    withUser: user2,
                    messages: [],
                    lastMessage: "Чат создан"
                });
            }
            
            if (!user2Data.chats.find(c => c.id === chatId)) {
                user2Data.chats.push({
                    id: chatId,
                    withUser: user1,
                    messages: [],
                    lastMessage: "Чат создан"
                });
            }
            
            localStorage.setItem('volits_users', JSON.stringify(users));
        }
        
        // Получение чатов пользователя
        function getUserChats(username) {
            let users = JSON.parse(localStorage.getItem('volits_users')) || [];
            const user = users.find(u => u.login === username);
            return user?.chats || [];
        }
        
        // Отправка сообщения
        function sendMessageToChat(chatId, message, sender) {
            let users = JSON.parse(localStorage.getItem('volits_users')) || [];
            const participants = chatId.split('-');
            const receiver = participants.find(p => p !== sender);
            
            users.forEach(user => {
                const chat = user.chats?.find(c => c.id === chatId);
                if (chat) {
                    if (!chat.messages) chat.messages = [];
                    chat.messages.push({
                        text: message,
                        time: new Date().toLocaleTimeString(),
                        sender: sender,
                        receiver: receiver
                    });
                    chat.lastMessage = message;
                }
            });
            
            localStorage.setItem('volits_users', JSON.stringify(users));
        }
        
        // Получение сообщений чата
        function getChatMessages(chatId) {
            let users = JSON.parse(localStorage.getItem('volits_users')) || [];
            const currentUserData = users.find(u => u.login === currentUser);
            const chat = currentUserData?.chats?.find(c => c.id === chatId);
            return chat?.messages || [];
        }
        
        // Выход из системы
        function logout() {
            localStorage.removeItem('session_active');
            localStorage.removeItem('current_user');
            currentUser = null;
            currentChat = null;
            location.reload();
        }
        
        // Переключение вкладок
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            
            tabs.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabs[0].classList.add('active');
                generateCaptcha('login');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabs[1].classList.add('active');
                generateCaptcha('register');
                renderAvatarOptions();
            }
        }
        
        // Обработка регистрации
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const captchaInput = document.getElementById('regCaptcha').value.trim().toUpperCase();
            const captchaWord = document.getElementById('regCaptchaWord').textContent;
            
            if (!username || !password) {
                alert('❌ Заполните все поля');
                return;
            }
            
            if (captchaInput !== captchaWord) {
                alert('❌ Неверная капча');
                generateCaptcha('register');
                return;
            }
            
            if (!selectedAvatar) {
                alert('❌ Выберите аватар');
                return;
            }
            
            const success = registerUser(username, password, selectedAvatar);
            if (success) {
                alert('✅ Регистрация успешна! Теперь войдите в систему.');
                switchTab('login');
                document.getElementById('loginUsername').value = username;
            }
        }
        
        // Обработка входа
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const captchaInput = document.getElementById('loginCaptcha').value.trim().toUpperCase();
            const captchaWord = document.getElementById('loginCaptchaWord').textContent;
            
            if (!username || !password) {
                alert('❌ Заполните все поля');
                return;
            }
            
            if (captchaInput !== captchaWord) {
                alert('❌ Неверная капча');
                generateCaptcha('login');
                return;
            }
            
            if (loginUser(username, password)) {
                currentUser = username;
                showMessenger();
            } else {
                alert('❌ Неверный логин или пароль');
            }
        }
        
        // Показать мессенджер
        function showMessenger() {
            document.getElementById('authContainer').style.display = 'none';
            const messengerContainer = document.getElementById('messengerContainer');
            messengerContainer.classList.add('active');
            
            // Создаем интерфейс мессенджера динамически
            messengerContainer.innerHTML = `
                <div class="chats-panel" id="chatsPanel">
                    <div class="search-area">
                        <div class="search-box">
                            <div class="search-input-wrapper">
                                <span>🔍</span>
                                <input type="text" placeholder="Найти чат..." id="searchChat" oninput="filterChats()">
                            </div>
                            <button class="global-search-btn" onclick="openGlobalSearch()">🌐</button>
                        </div>
                    </div>
                    <div class="chats-list" id="chatsList"></div>
                </div>
                
                <div class="chat-panel">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <div class="avatar" id="chatAvatar"></div>
                            <div class="chat-header-info">
                                <h2 id="chatName">Выберите чат</h2>
                                <div class="status" id="chatStatus"></div>
                            </div>
                        </div>
                        <div class="chat-header-right">
                            <button class="icon-btn">🔔</button>
                            <button class="icon-btn">📌</button>
                            <button class="icon-btn">🔍</button>
                        </div>
                    </div>
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="message-input-area">
                        <div class="message-input-wrapper">
                            <button class="emoji-btn" onclick="alert('😊 Эмодзи будут добавлены в следующей версии!')">😊</button>
                            <input type="text" placeholder="Введите сообщение..." id="messageInput" onkeypress="if(event.key==='Enter') sendMessage()">
                            <button class="attach-btn" onclick="alert('📎 Вложения в разработке')">📎</button>
                            <button class="send-btn" onclick="sendMessage()">📤</button>
                        </div>
                    </div>
                </div>
                
                <div class="profile-panel" id="profilePanel">
                    <div class="profile-avatar" id="profileAvatar"></div>
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-info">
                        <p>📅 Дата регистрации: 2024</p>
                        <p>💬 VOLits Messenger</p>
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                </div>
            `;
            
            // Загружаем данные пользователя
            const users = JSON.parse(localStorage.getItem('volits_users')) || [];
            const userData = users.find(u => u.login === currentUser);
            document.getElementById('profileName').textContent = currentUser;
            document.getElementById('profileAvatar').style.backgroundImage = `url('${userData.avatar}')`;
            document.getElementById('profileAvatar').style.backgroundSize = 'cover';
            
            renderChatsList();
        }
        
        // Рендер списка чатов
        function renderChatsList() {
            const chats = getUserChats(currentUser);
            const chatsList = document.getElementById('chatsList');
            
            if (!chatsList) return;
            
            chatsList.innerHTML = chats.map(chat => {
                const otherUser = chat.withUser;
                const users = JSON.parse(localStorage.getItem('volits_users')) || [];
                const otherUserData = users.find(u => u.login === otherUser);
                
                return `
                    <div class="chat-item ${currentChat?.id === chat.id ? 'active' : ''}" onclick="selectChat('${chat.id}')">
                        <div class="avatar" style="background-image: url('${otherUserData?.avatar}'); background-size: cover;"></div>
                        <div class="chat-info">
                            <div class="chat-name">${otherUser}</div>
                            <div class="last-message">${chat.lastMessage || 'Нет сообщений'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Выбор чата
        function selectChat(chatId) {
            currentChat = { id: chatId };
            const users = JSON.parse(localStorage.getItem('volits_users')) || [];
            const otherUser = chatId.split('-').find(u => u !== currentUser);
            const otherUserData = users.find(u => u.login === otherUser);
            
            document.getElementById('chatName').textContent = otherUser;
            document.getElementById('chatAvatar').style.backgroundImage = `url('${otherUserData?.avatar}')`;
            document.getElementById('chatAvatar').style.backgroundSize = 'cover';
            document.getElementById('chatStatus').textContent = otherUserData?.status || 'В сети';
            
            renderMessages();
        }
        
        // Рендер сообщений
        function renderMessages() {
            if (!currentChat) return;
            
            const messages = getChatMessages(currentChat.id);
            const messagesArea = document.getElementById('messagesArea');
            
            messagesArea.innerHTML = messages.map(msg => `
                <div class="message-wrapper ${msg.sender === currentUser ? 'own' : 'other'}">
                    <div class="message ${msg.sender === currentUser ? 'own' : 'other'}">
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentChat) return;
            
            sendMessageToChat(currentChat.id, text, currentUser);
            renderMessages();
            renderChatsList();
            input.value = '';
        }
        
        // Фильтрация чатов
        function filterChats() {
            const searchTerm = document.getElementById('searchChat').value.toLowerCase();
            const chats = getUserChats(currentUser);
            const filtered = chats.filter(chat => chat.withUser.toLowerCase().includes(searchTerm));
            
            const chatsList = document.getElementById('chatsList');
            const users = JSON.parse(localStorage.getItem('volits_users')) || [];
            
            chatsList.innerHTML = filtered.map(chat => {
                const otherUserData = users.find(u => u.login === chat.withUser);
                return `
                    <div class="chat-item" onclick="selectChat('${chat.id}')">
                        <div class="avatar" style="background-image: url('${otherUserData?.avatar}'); background-size: cover;"></div>
                        <div class="chat-info">
                            <div class="chat-name">${chat.withUser}</div>
                            <div class="last-message">${chat.lastMessage || 'Нет сообщений'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Глобальный поиск
        function openGlobalSearch() {
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>🌍 Найти пользователей VOLits</h3>
                        <button class="close-modal" onclick="this.closest('.modal').remove()">×</button>
                    </div>
                    <div class="search-user-input">
                        <input type="text" id="globalSearchInput" placeholder="Введите никнейм...">
                        <button onclick="performGlobalSearch()">🔍 Искать</button>
                    </div>
                    <div id="searchResults"></div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function performGlobalSearch() {
            const query = document.getElementById('globalSearchInput').value;
            const results = searchGlobalUsers(query, currentUser);
            const resultsContainer = document.getElementById('searchResults');
            
            if (results.length === 0) {
                resultsContainer.innerHTML = '<p>❌ Пользователи не найдены</p>';
            } else {
                resultsContainer.innerHTML = results.map(user => `
                    <div class="user-result" style="display: flex; align-items: center; gap: 16px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 16px; margin-bottom: 12px;">
                        <div class="user-result-avatar" style="width: 48px; height: 48px; border-radius: 50%; background-image: url('${user.avatar}'); background-size: cover;"></div>
                        <div class="user-result-info" style="flex: 1;">
                            <div class="user-result-name" style="font-weight: 600;">${user.login}</div>
                            <div>${user.status}</div>
                        </div>
                        <button class="start-chat-btn" onclick="startNewChat('${user.login}')" style="padding: 8px 16px; background: #7c3aed; border: none; border-radius: 8px; color: white; cursor: pointer;">Начать чат</button>
                    </div>
                `).join('');
            }
        }
        
        function startNewChat(userName) {
            createChat(currentUser, userName);
            document.querySelector('.modal')?.remove();
            renderChatsList();
            alert(`✅ Чат с ${userName} создан!`);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Создание частиц для фона
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 5 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = Math.random() * 15 + 10 + 's';
                container.appendChild(particle);
            }
        }
        
        // Инициализация
        initUsers();
        createParticles();
        
        // Проверка сессии
        const sessionActive = localStorage.getItem('session_active');
        const savedUser = localStorage.getItem('current_user');
        
        if (sessionActive === 'true' && savedUser) {
            currentUser = savedUser;
            showMessenger();
        } else {
            generateCaptcha('login');
        }
    </script>
</body>
</html>
